<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>TAMAGREN Tetris Pro</title>
    <style>
        :root {
            --primary: #00ffcc;
            --bg-dark: #0a0a12;
            --panel: rgba(20, 20, 35, 0.9);
            /* Responsive button size: scales between 50px and 80px based on screen width */
            --btn-size: clamp(60px, 18vw, 85px);
        }

        * {
            box-sizing: border-box;
            touch-action: manipulation;
        }

        body {
            background: radial-gradient(circle at center, #1a1a2e 0%, #0a0a12 100%);
            font-family: 'Segoe UI', Roboto, sans-serif;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Top Section: Game Board and Stats */
        .game-wrapper {
            display: flex;
            gap: 15px;
            align-items: flex-start;
            justify-content: center;
            width: 100%;
            height: 60vh;
            /* Takes up top 60% of screen */
            padding: 10px;
            margin-top: 10px;
        }

        .game-container {
            position: relative;
            height: 100%;
        }

        h1 {
            margin: 0 0 5px 0;
            font-size: 1.2rem;
            color: var(--primary);
            text-align: center;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.4);
        }

        canvas#tetris {
            background: #000;
            border: 3px solid #1f1f3a;
            border-radius: 8px;
            display: block;
            height: 90%;
            /* Scale to fit the wrapper */
            width: auto;
        }

        .side-panel {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100px;
        }

        .panel-box {
            background: var(--panel);
            padding: 8px;
            border-radius: 12px;
            border: 1px solid rgba(0, 255, 204, 0.15);
            text-align: center;
        }

        .stat-label {
            color: var(--primary);
            font-size: 0.6rem;
            text-transform: uppercase;
        }

        .stat-value {
            font-size: 1rem;
            font-weight: bold;
            font-family: monospace;
        }

        #nextCanvas {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 4px;
            width: 50px;
            height: 50px;
        }

        /* Overlays */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 18, 0.96);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            border-radius: 8px;
            text-align: center;
        }

        button {
            background: transparent;
            color: var(--primary);
            border: 2px solid var(--primary);
            border-radius: 8px;
            padding: 10px;
            font-weight: bold;
            cursor: pointer;
            margin: 5px 0;
        }

        /* Bottom Section: Controls */
        .controls-wrapper {
            width: 100%;
            height: 35vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.2);
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(3, var(--btn-size));
            grid-template-rows: repeat(2, var(--btn-size));
            gap: 12px;
        }

        .ctrl-btn {
            width: var(--btn-size);
            height: var(--btn-size);
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid var(--primary);
            color: white;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            user-select: none;
            box-shadow: 0 4px 0 rgba(0, 255, 204, 0.2);
        }

        .ctrl-btn:active {
            background: var(--primary);
            color: black;
            transform: translateY(3px);
            box-shadow: none;
        }

        @media (max-width: 500px) {
            #leaderboard {
                display: none;
            }
        }
    </style>
</head>

<body>

    <div class="game-wrapper">
        <div class="side-panel">
            <div class="panel-box">
                <div class="stat-label">Next</div>
                <canvas id="nextCanvas" width="80" height="80"></canvas>
            </div>
            <div class="panel-box">
                <div class="stat-label">Score</div>
                <div id="score" class="stat-value">0</div>
            </div>
            <button id="pauseBtn" onclick="togglePause()">PAUSE</button>
        </div>

        <div class="game-container">
            <h1>TAMAGREN</h1>
            <div id="welcome-screen" class="overlay">
                <h2 style="color: var(--primary)">TAMAGREN PRO</h2>
                <div style="width: 80%">
                    <button style="width:100%" onclick="startGame(800)">Easy</button>
                    <button style="width:100%" onclick="startGame(400)">Medium</button>
                    <button style="width:100%" onclick="startGame(150)">Hard</button>
                </div>
            </div>

            <div id="game-over-screen" class="overlay" style="display: none;">
                <h2 style="color: #ff4d4d">GAME OVER</h2>
                <input type="text" id="playerName" maxlength="10" placeholder="Name"
                    style="padding:8px; margin-bottom:10px;">
                <button onclick="saveScore()">Submit Score</button>
            </div>

            <canvas id="tetris" width="240" height="400"></canvas>
        </div>

        <div class="side-panel" id="leaderboard">
            <div class="panel-box">
                <div class="stat-label">🏆 Top 5</div>
                <div id="score-list" style="margin-top: 5px; font-size: 0.7rem;"></div>
            </div>
        </div>
    </div>

    <div class="controls-wrapper">
        <div class="controls">
            <div class="ctrl-btn" style="grid-column: 2" onpointerdown="playerRotate()">↻</div>
            <div class="ctrl-btn" style="grid-column: 1; grid-row: 2" onpointerdown="playerMove(-1)">←</div>
            <div class="ctrl-btn" style="grid-column: 2; grid-row: 2" onpointerdown="playerDrop()">↓</div>
            <div class="ctrl-btn" style="grid-column: 3; grid-row: 2" onpointerdown="playerMove(1)">→</div>
        </div>
    </div>

    <script>
        // --- AUDIO SYSTEM ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            if (type === 'move') {
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'rotate') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(300, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
                osc.start(); osc.stop(audioCtx.currentTime + 0.05);
            } else if (type === 'clear') {
                osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.3);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            }
        }

        // --- GAME LOGIC ---
        const canvas = document.getElementById('tetris');
        const context = canvas.getContext('2d');
        context.scale(20, 20);

        const nextCanvas = document.getElementById('nextCanvas');
        const nextContext = nextCanvas.getContext('2d');
        nextContext.scale(20, 20);

        const colors = [null, '#00f0f0', '#0077ff', '#ffaa00', '#ffee00', '#00ff66', '#aa00ff', '#ff3355'];

        function createPiece(type) {
            if (type === 'I') return [[0, 1, 0, 0], [0, 1, 0, 0], [0, 1, 0, 0], [0, 1, 0, 0]];
            if (type === 'L') return [[0, 3, 0], [0, 3, 0], [0, 3, 3]];
            if (type === 'J') return [[0, 2, 0], [0, 2, 0], [2, 2, 0]];
            if (type === 'O') return [[4, 4], [4, 4]];
            if (type === 'Z') return [[7, 7, 0], [0, 7, 7], [0, 0, 0]];
            if (type === 'S') return [[0, 5, 5], [5, 5, 0], [0, 0, 0]];
            if (type === 'T') return [[0, 6, 0], [6, 6, 6], [0, 0, 0]];
        }

        function drawMatrix(matrix, offset, ctx) {
            matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        ctx.fillStyle = colors[value];
                        ctx.fillRect(x + offset.x, y + offset.y, 1, 1);
                        ctx.strokeStyle = '#000';
                        ctx.lineWidth = 0.05;
                        ctx.strokeRect(x + offset.x, y + offset.y, 1, 1);
                    }
                });
            });
        }

        function draw() {
            context.fillStyle = '#000';
            context.fillRect(0, 0, canvas.width, canvas.height);
            drawMatrix(arena, { x: 0, y: 0 }, context);
            drawMatrix(player.matrix, player.pos, context);

            nextContext.clearRect(0, 0, nextCanvas.width, nextCanvas.height);
            drawMatrix(nextPiece, { x: 1, y: 1 }, nextContext);
        }

        function arenaSweep() {
            let rowCount = 1;
            let cleared = false;
            outer: for (let y = arena.length - 1; y > 0; --y) {
                for (let x = 0; x < arena[y].length; ++x) {
                    if (arena[y][x] === 0) continue outer;
                }
                arena.unshift(arena.splice(y, 1)[0].fill(0));
                ++y;
                player.score += rowCount * 100;
                rowCount *= 2;
                cleared = true;
            }
            if (cleared) playSound('clear');
        }

        function collide(arena, player) {
            const [m, o] = [player.matrix, player.pos];
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] !== 0 && (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) return true;
                }
            }
            return false;
        }

        function rotate(matrix, dir) {
            for (let y = 0; y < matrix.length; ++y) {
                for (let x = 0; x < y; ++x) [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
            }
            if (dir > 0) matrix.forEach(row => row.reverse()); else matrix.reverse();
        }

        function playerReset() {
            const pieces = 'ILJOTSZ';
            player.matrix = nextPiece || createPiece(pieces[pieces.length * Math.random() | 0]);
            nextPiece = createPiece(pieces[pieces.length * Math.random() | 0]);
            player.pos.y = 0;
            player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
            if (collide(arena, player)) gameOver();
        }

        function playerDrop() {
            if (gamePaused) return;
            player.pos.y++;
            if (collide(arena, player)) {
                player.pos.y--;
                player.matrix.forEach((row, y) => {
                    row.forEach((val, x) => {
                        if (val !== 0) arena[y + player.pos.y][x + player.pos.x] = val;
                    });
                });
                playerReset();
                arenaSweep();
                document.getElementById('score').innerText = player.score;
            }
            dropCounter = 0;
        }

        function playerMove(dir) {
            if (gamePaused) return;
            player.pos.x += dir;
            if (collide(arena, player)) {
                player.pos.x -= dir;
            } else {
                playSound('move');
            }
        }

        function playerRotate() {
            if (gamePaused) return;
            const pos = player.pos.x;
            let offset = 1;
            rotate(player.matrix, 1);
            while (collide(arena, player)) {
                player.pos.x += offset;
                offset = -(offset + (offset > 0 ? 1 : -1));
                if (offset > player.matrix[0].length) {
                    rotate(player.matrix, -1);
                    player.pos.x = pos;
                    return;
                }
            }
            playSound('rotate');
        }

        function togglePause() {
            if (document.getElementById('welcome-screen').style.display === 'none' &&
                document.getElementById('game-over-screen').style.display === 'none') {
                gamePaused = !gamePaused;
                document.getElementById('pauseBtn').innerText = gamePaused ? "RESUME" : "PAUSE";
            }
        }

        const arena = Array.from({ length: 20 }, () => new Array(12).fill(0));
        const player = { pos: { x: 0, y: 0 }, matrix: null, score: 0 };
        let nextPiece = null;
        let gamePaused = true;
        let dropCounter = 0, dropInterval = 1000, lastTime = 0;

        function startGame(speed) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            dropInterval = speed;
            document.getElementById('welcome-screen').style.display = 'none';
            document.getElementById('game-over-screen').style.display = 'none';
            arena.forEach(row => row.fill(0));
            player.score = 0;
            document.getElementById('score').innerText = "0";
            nextPiece = null;
            gamePaused = false;
            document.getElementById('pauseBtn').innerText = "PAUSE";
            playerReset();
        }

        function gameOver() {
            gamePaused = true;
            document.getElementById('game-over-screen').style.display = 'flex';
        }

        function saveScore() {
            const name = document.getElementById('playerName').value || 'Anon';
            let scores = JSON.parse(localStorage.getItem('tamagren_scores')) || [];
            scores.push({ name, score: player.score });
            scores.sort((a, b) => b.score - a.score);
            localStorage.setItem('tamagren_scores', JSON.stringify(scores.slice(0, 5)));
            document.getElementById('game-over-screen').style.display = 'none';
            document.getElementById('welcome-screen').style.display = 'flex';
            updateLeaderboard();
        }

        function updateLeaderboard() {
            const scores = JSON.parse(localStorage.getItem('tamagren_scores')) || [];
            document.getElementById('score-list').innerHTML = scores.map(s =>
                `<div style="display:flex; justify-content:space-between;"><span>${s.name}</span><b>${s.score}</b></div>`).join('');
        }

        function update(time = 0) {
            if (!gamePaused) {
                const deltaTime = time - lastTime;
                lastTime = time;
                dropCounter += deltaTime;
                if (dropCounter > dropInterval) playerDrop();
                draw();
            } else {
                lastTime = time;
            }
            requestAnimationFrame(update);
        }

        document.addEventListener('keydown', e => {
            if (e.key === 'p' || e.key === 'P') togglePause();
            if (gamePaused) return;
            if (e.key === 'ArrowLeft') playerMove(-1);
            if (e.key === 'ArrowRight') playerMove(1);
            if (e.key === 'ArrowDown') playerDrop();
            if (e.key === 'ArrowUp') playerRotate();
        });

        updateLeaderboard();
        update();
    </script>
</body>

</html>
